<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather & Music</title>
    <style>
        /* ページ全体の背景とフォント設定 */
        body {
            margin: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            /* リッチな夜空のようなグラデーション背景 */
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* すりガラス風のメインパネル（グラスモーフィズム） */
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        h1 {
            margin-top: 0;
            font-size: 1.8rem;
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        p.subtitle {
            color: #b3b3b3;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        /* ボタンの共通デザイン */
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin: 15px 0;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        /* ボタンにカーソルを合わせた時のフワッと浮くアニメーション */
        .btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 7px 20px rgba(0,0,0,0.4);
        }

        /* ボタンが押せない状態のデザイン */
        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        /* 1. Spotifyボタン（Spotifyのブランドカラー） */
        #loginBtn {
            background-color: #1DB954;
            color: white;
            box-shadow: 0 4px 15px rgba(29, 185, 84, 0.3);
        }

        /* 2. 天気ボタン（夕焼けのようなグラデーション） */
        #getWeatherBtn {
            background: linear-gradient(45deg, #FF512F 0%, #F09819 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 81, 47, 0.3);
        }

        /* 結果表示エリア */
        #result {
            margin-top: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            min-height: 80px;
            text-align: left;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* リスト（曲名）のデザイン */
        ul {
            padding-left: 20px;
            color: #e0e0e0;
        }

        li {
            margin-bottom: 12px;
            line-height: 1.4;
        }

        li strong {
            color: #ffffff;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎧 Weather Beats ⛅️</h1>
        <p class="subtitle">今の天気から、あなたにぴったりの曲を。</p>
        
        <button id="loginBtn" class="btn">1. Spotifyと連携する</button>
        <button id="getWeatherBtn" class="btn" disabled>2. いまの天気から曲を生成</button> 
        
        <div id="result">
            <p style="text-align: center; color: #888;">ここに結果が表示されます</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
