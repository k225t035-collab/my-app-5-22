<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Weather Beats</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">

    <style>
        /* === 🎨 カラーパレット（モックアップ準拠） === */
        :root {
            --bg-main: #0b0f19; /* 深いネイビー */
            --bg-card: #141b2a;
            --bg-glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-sub: #8b9bb4;
            --gradient-accent: linear-gradient(135deg, #a855f7 0%, #3b82f6 100%);
            --spotify-green: #1db954;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }

        .app-container { width: 100%; max-width: 900px; padding: 30px 20px; box-sizing: border-box; }

        /* === 🎩 ナビゲーション === */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 50px; }
        .logo { font-size: 1.2rem; font-weight: 900; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; }
        .v-badge { font-size: 0.7rem; color: #a855f7; vertical-align: super; font-weight: bold; }
        .user-info { display: flex; align-items: center; gap: 12px; }
        #userProfile { font-size: 0.85rem; color: var(--text-sub); }
        .btn-clear { background: transparent; border: none; color: var(--text-sub); font-size: 0.85rem; cursor: pointer; transition: color 0.2s; }
        .btn-clear:hover { color: white; }

        /* === 🌟 ヒーローセクション === */
        .hero { margin-bottom: 40px; }
        .hero h1 { font-size: 3.5rem; font-weight: 900; margin: 0 0 10px 0; line-height: 1.1; letter-spacing: -1px; }
        .gradient-text { background: var(--gradient-accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero p { color: var(--text-sub); font-size: 1.1rem; margin-bottom: 30px; }

        /* === 🔘 ボタン === */
        .btn { border: none; border-radius: 50px; padding: 14px 28px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.2s ease; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: var(--gradient-accent); color: white; padding: 16px 32px; box-shadow: 0 8px 24px rgba(168, 85, 247, 0.3); }
        .btn-primary:hover { box-shadow: 0 8px 32px rgba(168, 85, 247, 0.5); filter: brightness(1.1); }
        .btn-outline { background: transparent; border: 1px solid var(--border-glass); color: white; padding: 15px 32px; }
        .btn-outline:hover { background: rgba(255,255,255,0.05); }

        /* === 🔍 検索＆アクション === */
        .controls-wrapper { display: flex; gap: 12px; margin-bottom: 40px; flex-wrap: wrap; }
        .search-box { flex-grow: 1; display: flex; background: var(--bg-card); border: 1px solid var(--border-glass); border-radius: 50px; overflow: hidden; padding: 4px; }
        input[type="text"] { background: transparent; border: none; padding: 12px 20px; color: white; font-size: 1rem; outline: none; width: 100%; }
        .search-btn { background: var(--gradient-accent); border: none; border-radius: 50px; color: white; padding: 0 24px; font-weight: bold; cursor: pointer; }

        /* === 🏙️ 都市カード (Explore Cities) === */
        .section-title { font-size: 0.8rem; color: var(--text-sub); font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .section-title::before { content: ""; display: block; width: 6px; height: 6px; background: #3b82f6; border-radius: 50%; }
        
        .city-grid { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 20px; scrollbar-width: none; }
        .city-grid::-webkit-scrollbar { display: none; }
        .city-card {
            min-width: 140px; height: 180px; border-radius: 16px; background-size: cover; background-position: center;
            position: relative; cursor: pointer; overflow: hidden; transition: transform 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
        }
        .city-card:hover { transform: translateY(-5px); }
        .city-card::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%); }
        .city-info { position: absolute; bottom: 12px; left: 12px; z-index: 2; }
        .city-info h4 { margin: 0 0 4px 0; font-size: 1.1rem; }

        /* === 🌤️ 結果ダッシュボード === */
        #result-container { display: none; width: 100%; margin-top: 20px; }
        .dashboard-card { background: var(--bg-card); border: 1px solid var(--border-glass); border-radius: 24px; padding: 30px; display: flex; gap: 40px; flex-wrap: wrap; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        
        .dash-left { flex: 1; min-width: 200px; border-right: 1px solid var(--border-glass); padding-right: 20px; }
        .dash-city { font-size: 1.8rem; font-weight: 900; margin-bottom: 8px; }
        .dash-weather { color: var(--text-sub); font-size: 1.1rem; margin-bottom: 20px; }
        .dash-temp { font-size: 3rem; font-weight: 700; background: var(--gradient-accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .dash-right { flex: 2; min-width: 250px; }
        .mood-title { font-size: 0.8rem; color: var(--text-sub); letter-spacing: 1px; margin-bottom: 8px; text-transform: uppercase; }
        .mood-tag { font-size: 1.4rem; font-weight: 700; margin-bottom: 20px; color: white; }
        
        .track-list { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: thin; scrollbar-color: var(--border-glass) transparent; }
        .track-item { min-width: 100px; text-align: center; }
        .track-img { width: 100px; height: 100px; border-radius: 12px; margin-bottom: 8px; object-fit: cover; box-shadow: 0 8px 16px rgba(0,0,0,0.5); transition: transform 0.2s; }
        .track-img:hover { transform: scale(1.05); }
        .track-title { font-size: 0.75rem; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-artist { font-size: 0.65rem; color: var(--text-sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .save-btn-container { width: 100%; display: flex; justify-content: flex-end; margin-top: 20px; }
        
        #loading { text-align: center; color: #a855f7; font-weight: bold; padding: 40px; display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="url(#grad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#a855f7" /><stop offset="100%" stop-color="#3b82f6" /></linearGradient></defs>
                <path d="M3 18v-6a9 9 0 0 1 18 0v6"></path><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path>
            </svg>
            DYNAMIC<span class="v-badge">v4.1</span>
        </div>
        <div class="user-info">
            <span id="userProfile" style="display:none;"></span>
            <button id="clearBtn" class="btn-clear">ログアウト</button>
        </div>
    </header>

    <div id="loginSection">
        <div class="hero">
            <h1><span class="gradient-text">Dynamic</span><br>Weather Beats</h1>
            <p>世界のどこかへ、音のトリップ。<br>現在の天気や時間に合わせて、あなただけのプレイリストをお届けします。</p>
            <button id="loginBtn" class="btn btn-primary">Spotifyで始める</button>
        </div>
    </div>

    <div id="mainAppSection" style="display: none;">
        <div class="controls-wrapper">
            <div class="search-box">
                <input type="text" id="cityInput" placeholder="都市名をローマ字で入力 (例: Kyoto)">
                <button id="getWeatherBtn" class="search-btn">検索</button>
            </div>
            <button id="gpsBtn" class="btn btn-outline">📍 現在地</button>
        </div>

        <div class="section-title">Explore Cities</div>
        <div class="city-grid">
            <div class="city-card" style="background-image: url('https://images.unsplash.com/photo-1502602898657-3e91760cbb34?w=400&q=80')" onclick="selectCity('Paris')">
                <div class="city-info"><h4>Paris</h4></div>
            </div>
            <div class="city-card" style="background-image: url('https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?w=400&q=80')" onclick="selectCity('Tokyo')">
                <div class="city-info"><h4>Tokyo</h4></div>
            </div>
            <div class="city-card" style="background-image: url('https://images.unsplash.com/photo-1496442226666-8d4d0e62e6e9?w=400&q=80')" onclick="selectCity('New York')">
                <div class="city-info"><h4>New York</h4></div>
            </div>
            
            <div class="city-card" style="background-image: url('https://images.unsplash.com/photo-1526129318478-62ed807ebdf9?w=400&q=80')" onclick="selectCity('London')">
                <div class="city-info"><h4>London</h4></div>
            </div>
            
            <div class="city-card" style="background-image: url('https://images.unsplash.com/photo-1506973035872-a4ec16b8e8d9?w=400&q=80')" onclick="selectCity('Sydney')">
                <div class="city-info"><h4>Sydney</h4></div>
            </div>
        </div>

        <div id="loading">🎵 世界の空気を取得中...</div>
        
        <div id="result-container"></div>
    </div>
</div>

<script>
    const WEATHER_API_KEY = "6569f9193b1871a2521eeb1bb5ffc92a";
    const SPOTIFY_CLIENT_ID = "25fdf849cdf44da99c0730897f152a37";
    const REDIRECT_URI = "https://k225t035-collab.github.io/my-app-5-22/";

    const BASE_AUTH_URL = "https://" + "accounts." + "spotify.com/authorize?";
    const BASE_TOKEN_URL = "https://" + "accounts." + "spotify.com/api/token";
    const BASE_API_URL = "https://" + "api." + "spotify.com/v1";
    const BASE_WEATHER_URL = "https://api.openweathermap.org/data/2.5/weather?";

    function generateRandomString(length) {
        let text = '';
        const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
        for (let i = 0; i < length; i++) text += possible.charAt(Math.floor(Math.random() * possible.length));
        return text;
    }

    async function generateCodeChallenge(codeVerifier) {
        const data = new TextEncoder().encode(codeVerifier);
        const digest = await window.crypto.subtle.digest('SHA-256', data);
        const base64chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-_";
        let result = "";
        const bytes = new Uint8Array(digest);
        for (let i = 0; i < bytes.length; i += 3) {
            const b1 = bytes[i], b2 = i + 1 < bytes.length ? bytes[i + 1] : 0, b3 = i + 2 < bytes.length ? bytes[i + 2] : 0;
            const group = (b1 << 16) | (b2 << 8) | b3;
            result += base64chars[(group >> 18) & 63] + base64chars[(group >> 12) & 63];
            result += i + 1 < bytes.length ? base64chars[(group >> 6) & 63] : "";
            result += i + 2 < bytes.length ? base64chars[group & 63] : "";
        }
        return result;
    }

    async function searchMusic(weatherUrl) {
        const token = localStorage.getItem("spotify_access_token");
        const container = document.getElementById("result-container");
        const loader = document.getElementById("loading");

        container.style.display = "none";
        loader.style.display = "block";

        try {
            const wRes = await fetch(weatherUrl);
            const wData = await wRes.json();
            
            if (wData.cod != 200) throw new Error("都市が見つかりません。");

            const weather = wData.weather[0].main;
            const temp = Math.round(wData.main.temp);
            const humidity = wData.main.humidity;
            const cityName = wData.name;
            const country = wData.sys.country;

            const d = new Date();
            const utc = d.getTime() + (d.getTimezoneOffset() * 60000);
            const localTime = new Date(utc + (wData.timezone * 1000));
            const hour = localTime.getHours();
            const minutes = String(localTime.getMinutes()).padStart(2, '0');

            let timeTag = "night chill";
            let moodLabel = "Lo-fi / Jazz / Chill";
            let moodDesc = "夜の静けさと一緒に、心を落ち着けるサウンドを。";
            
            if (hour >= 5 && hour < 11) { timeTag = "morning acoustic energetic"; moodLabel = "Acoustic / Fresh"; moodDesc = "新しい一日を彩る、爽やかな朝のプレイリスト。"; }
            else if (hour >= 11 && hour < 16) { timeTag = "afternoon pop happy"; moodLabel = "Pop / Sunny Vibes"; moodDesc = "明るい日差しにぴったりのアップテンポな曲。"; }
            else if (hour >= 16 && hour < 19) { timeTag = "sunset twilight r&b"; moodLabel = "R&B / Twilight"; moodDesc = "夕暮れの街並みに溶け込む、エモーショナルな選曲。"; }

            let weatherTag = "chill";
            let weatherIcon = "☁️";
            if (weather === "Clear") { weatherTag = temp >= 25 ? "summer energetic" : "happy breezy"; weatherIcon = "☀️"; }
            else if (weather === "Rain") { weatherTag = "rainy jazz piano"; weatherIcon = "🌧️"; }
            else if (weather === "Snow") { weatherTag = "winter ambient"; weatherIcon = "❄️"; }

            const q = `${weatherTag} ${timeTag}`;
            const sRes = await fetch(`${BASE_API_URL}/search?q=${encodeURIComponent(q)}&type=track&limit=8`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const sData = await sRes.json();

            loader.style.display = "none";
            container.style.display = "block";
            
            let tracksHtml = '';
            const trackUris = [];
            if (sData && sData.tracks && sData.tracks.items) {
                sData.tracks.items.forEach(track => {
                    trackUris.push(track.uri);
                    tracksHtml += `
                        <div class="track-item">
                            <a href="${track.external_urls.spotify}" target="_blank">
                                <img src="${track.album.images[0].url}" class="track-img">
                            </a>
                            <div class="track-title">${track.name}</div>
                            <div class="track-artist">${track.artists[0].name}</div>
                        </div>`;
                });
            }

            container.innerHTML = `
                <div class="section-title" style="margin-top:30px;">Current Mood</div>
                <div class="dashboard-card">
                    <div class="dash-left">
                        <div class="mood-title">現在地 / 検索地</div>
                        <div class="dash-city">${cityName}, ${country}</div>
                        <div class="dash-weather">${weatherIcon} ${weather} ・ ⏰ ${hour}:${minutes}</div>
                        <div class="dash-temp">${temp}°C</div>
                        <div style="color:var(--text-sub); font-size:0.8rem; margin-top:10px;">湿度 ${humidity}%</div>
                    </div>
                    <div class="dash-right">
                        <div class="mood-title">MOOD</div>
                        <div class="mood-tag">${moodLabel}</div>
                        <p style="color:var(--text-sub); font-size:0.9rem; margin-bottom:20px;">${moodDesc}</p>
                        <div class="track-list">
                            ${tracksHtml}
                        </div>
                    </div>
                </div>
                <div class="save-btn-container">
                    <button class="btn btn-primary" onclick='window.savePlaylist(this, "${cityName} Mood", ${JSON.stringify(trackUris)})'>
                        🎵 プレイリストとして保存
                    </button>
                </div>
            `;

        } catch (e) { 
            loader.style.display = "none";
            alert(e.message); 
        }
    }

    window.selectCity = function(cityName) {
        document.getElementById("cityInput").value = cityName;
        searchMusic(`${BASE_WEATHER_URL}q=${cityName}&appid=${WEATHER_API_KEY}&units=metric`);
    };

    window.savePlaylist = async function(btn, name, uris) {
        const token = localStorage.getItem("spotify_access_token");
        const originalText = btn.innerHTML;
        btn.innerText = "⏳ 保存中...";
        try {
            const r1 = await fetch(`${BASE_API_URL}/me/playlists`, { method: 'POST', headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }, body: JSON.stringify({ name: name, public: false }) });
            const d1 = await r1.json();
            if (!r1.ok) throw new Error("枠の作成に失敗");
            const r2 = await fetch(`${BASE_API_URL}/playlists/${d1.id}/items`, { method: 'POST', headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }, body: JSON.stringify({ uris: uris }) });
            if (!r2.ok) throw new Error("追加に失敗");
            btn.outerHTML = `<a href="${d1.external_urls.spotify}" target="_blank" class="btn btn-primary" style="text-decoration:none;">✨ Spotifyで開く</a>`;
        } catch (e) { alert("保存失敗: " + e.message); btn.innerHTML = originalText; }
    };

    window.addEventListener('DOMContentLoaded', () => {
        const loginBtn = document.getElementById("loginBtn");
        if (loginBtn) {
            loginBtn.addEventListener("click", async () => {
                const verifier = generateRandomString(128);
                localStorage.setItem("spotify_verifier", verifier);
                const challenge = await generateCodeChallenge(verifier);
                const params = new URLSearchParams({ client_id: SPOTIFY_CLIENT_ID, response_type: 'code', redirect_uri: REDIRECT_URI, scope: 'playlist-modify-public playlist-modify-private', code_challenge_method: 'S256', code_challenge: challenge });
                window.location.href = BASE_AUTH_URL + params.toString();
            });
        }

        const code = new URLSearchParams(window.location.search).get('code');
        if (code) {
            const verifier = localStorage.getItem("spotify_verifier");
            fetch(BASE_TOKEN_URL, {
                method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ client_id: SPOTIFY_CLIENT_ID, grant_type: 'authorization_code', code, redirect_uri: REDIRECT_URI, code_verifier: verifier })
            }).then(r => r.json()).then(data => {
                if (data.access_token) {
                    localStorage.setItem("spotify_access_token", data.access_token);
                    window.history.replaceState({}, document.title, window.location.pathname);
                    location.reload();
                }
            });
        }

        const savedToken = localStorage.getItem("spotify_access_token");
        if (savedToken) {
            document.getElementById("loginSection").style.display = "none";
            document.getElementById("mainAppSection").style.display = "block";
            
            fetch(`${BASE_API_URL}/me`, { headers: { 'Authorization': 'Bearer ' + savedToken } })
                .then(r => r.json()).then(data => {
                    if (data && data.display_name) {
                        const profile = document.getElementById("userProfile");
                        profile.innerText = `${data.display_name}さん`;
                        profile.style.display = "block";
                    }
                });
        }

        document.getElementById("gpsBtn").addEventListener("click", () => {
            navigator.geolocation.getCurrentPosition(p => {
                searchMusic(`${BASE_WEATHER_URL}lat=${p.coords.latitude}&lon=${p.coords.longitude}&appid=${WEATHER_API_KEY}&units=metric`);
            }, () => alert("位置情報の取得に失敗しました。"));
        });

        document.getElementById("getWeatherBtn").addEventListener("click", () => {
            const city = document.getElementById("cityInput").value || "Kyoto";
            searchMusic(`${BASE_WEATHER_URL}q=${city}&appid=${WEATHER_API_KEY}&units=metric`);
        });

        document.getElementById("clearBtn").addEventListener("click", () => { localStorage.clear(); location.reload(); });
    });
</script>
</body>
</html>
