<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Beats | 景色と音楽をリンクする</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --spotify-green: #1db954; --spotify-green-hover: #1ed760; --bg-dark: #121212; --text-main: #ffffff; --text-sub: #b3b3b3; --glass-bg: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1); }
        body { margin: 0; padding: 0; font-family: 'Inter', 'Noto Sans JP', sans-serif; background-color: var(--bg-dark); background: linear-gradient(135deg, #121212 0%, #1e1e1e 100%); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .app-container { width: 100%; max-width: 600px; padding: 20px; box-sizing: border-box; }
        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 16px; padding: 24px; margin-bottom: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-top: 20px; }
        .logo { font-size: 1.5rem; font-weight: 800; }
        .v-badge { font-size: 0.8rem; color: #ff4757; vertical-align: super; font-weight: bold; }
        .user-info { display: flex; align-items: center; gap: 12px; }
        #userProfile { font-size: 0.9rem; color: var(--text-sub); font-weight: 600; }
        .btn { border: none; border-radius: 50px; padding: 12px 24px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.2s ease; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .btn:active { transform: scale(0.96); }
        .btn-spotify { background-color: var(--spotify-green); color: #000; width: 100%; padding: 16px; margin-top: 10px; }
        .btn-spotify:hover { background-color: var(--spotify-green-hover); }
        .btn-sub { background-color: rgba(255, 255, 255, 0.1); color: var(--text-main); }
        .btn-sub:hover { background-color: rgba(255, 255, 255, 0.2); }
        .btn-clear { background: transparent; border: 1px solid rgba(255, 255, 255, 0.2); color: var(--text-sub); font-size: 0.8rem; padding: 6px 12px; }
        .search-box { display: flex; gap: 10px; margin-bottom: 16px; }
        input[type="text"] { flex-grow: 1; background: rgba(0, 0, 0, 0.2); border: 1px solid var(--glass-border); border-radius: 8px; padding: 14px 16px; color: white; font-size: 1rem; outline: none; }
        input[type="text"]:focus { border-color: var(--spotify-green); }
        .quick-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .city-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
        .chip { background: rgba(255, 255, 255, 0.08); padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; color: var(--text-sub); cursor: pointer; }
        .chip:hover { background: rgba(255, 255, 255, 0.2); color: white; }
        #loading { text-align: center; color: var(--spotify-green); font-weight: 600; padding: 20px; display: none; }
        .track-card { display: flex; align-items: center; background: rgba(0, 0, 0, 0.3); border-radius: 8px; padding: 12px; margin-bottom: 12px; gap: 16px; }
        .track-img { width: 56px; height: 56px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="logo">🌤️ Weather Beats<span class="v-badge">v2.0</span></div>
        <div class="user-info">
            <span id="userProfile" style="display:none;"></span>
            <button id="clearBtn" class="btn btn-clear">リセット</button>
        </div>
    </header>

    <button id="loginBtn" class="btn btn-spotify">Spotifyアカウントを同期する</button>

    <section id="weatherAppSection" class="glass-panel" style="display:none;">
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="都市名 (例: Kyoto)">
            <button id="getWeatherBtn" class="btn btn-spotify" style="width:auto; margin-top:0; padding:14px 20px;">検索</button>
        </div>
        <div class="quick-actions">
            <button id="gpsBtn" class="btn btn-sub">📍 現在地</button>
            <button id="tripBtn" class="btn btn-sub">🎲 ランダム</button>
        </div>
        <div class="city-chips">
            <div class="chip" onclick="selectCity('Tokyo')">Tokyo</div>
            <div class="chip" onclick="selectCity('London')">London</div>
            <div class="chip" onclick="selectCity('Paris')">Paris</div>
            <div class="chip" onclick="selectCity('New York')">New York</div>
            <div class="chip" onclick="selectCity('Honolulu')">Honolulu</div>
        </div>
    </section>

    <div id="loading"></div>
    <section id="result"></section>
</div>

<script>
    const WEATHER_API_KEY = "6569f9193b1871a2521eeb1bb5ffc92a";
    const SPOTIFY_CLIENT_ID = "25fdf849cdf44da99c0730897f152a37";
    const REDIRECT_URI = "https://k225t035-collab.github.io/my-app-5-22/";

    const BASE_AUTH_URL = "https://" + "accounts." + "spotify.com/authorize?";
    const BASE_TOKEN_URL = "https://" + "accounts." + "spotify.com/api/token";
    const BASE_API_URL = "https://" + "api." + "spotify.com/v1";
    const BASE_WEATHER_URL = "https://api.openweathermap.org/data/2.5/weather?";

    const WORLD_CITIES = ["London", "Paris", "New York", "Reykjavik", "Honolulu", "Cairo", "Sydney", "Bangkok", "Rio de Janeiro", "Berlin"];

    function generateRandomString(length) {
        let text = '';
        const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
        for (let i = 0; i < length; i++) text += possible.charAt(Math.floor(Math.random() * possible.length));
        return text;
    }

    async function generateCodeChallenge(codeVerifier) {
        const data = new TextEncoder().encode(codeVerifier);
        const digest = await window.crypto.subtle.digest('SHA-256', data);
        const base64chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-_";
        let result = "";
        const bytes = new Uint8Array(digest);
        for (let i = 0; i < bytes.length; i += 3) {
            const b1 = bytes[i], b2 = i + 1 < bytes.length ? bytes[i + 1] : 0, b3 = i + 2 < bytes.length ? bytes[i + 2] : 0;
            const group = (b1 << 16) | (b2 << 8) | b3;
            result += base64chars[(group >> 18) & 63] + base64chars[(group >> 12) & 63];
            result += i + 1 < bytes.length ? base64chars[(group >> 6) & 63] : "";
            result += i + 2 < bytes.length ? base64chars[group & 63] : "";
        }
        return result;
    }

    async function searchMusic(weatherUrl) {
        const token = localStorage.getItem("spotify_access_token");
        const resultDiv = document.getElementById("result");
        const loader = document.getElementById("loading");

        if (resultDiv) resultDiv.innerHTML = "";
        if (loader) {
            loader.style.display = "block";
            loader.innerText = "🎵 選曲中...";
        }

        try {
            const wRes = await fetch(weatherUrl);
            const wData = await wRes.json();
            
            // 💡 == 200 に変更（念のためのエラー回避）
            if (wData.cod != 200) throw new Error("都市が見つかりません。ローマ字で入力してください");

            const weather = wData.weather[0].main;
            const temp = Math.round(wData.main.temp);
            const cityName = wData.name;

            // 💡 現地時間の計算ロジック（そのままですが確実です）
            const d = new Date();
            const utc = d.getTime() + (d.getTimezoneOffset() * 60000);
            const localTime = new Date(utc + (wData.timezone * 1000));
            
            const hour = localTime.getHours();
            const minutes = String(localTime.getMinutes()).padStart(2, '0');
            const localTimeStr = `${hour}:${minutes}`;

            let timeTag = "night mellow";
            let timeLabel = "🌌 深夜の静寂";
            if (hour >= 5 && hour < 11) { timeTag = "morning fresh energetic"; timeLabel = "🌅 朝の爽やか"; }
            else if (hour >= 11 && hour < 16) { timeTag = "afternoon sunny happy"; timeLabel = "☀️ 昼の快適"; }
            else if (hour >= 16 && hour < 19) { timeTag = "sunset twilight chill"; timeLabel = "🌆 夕方の哀愁"; }

            if (loader) loader.innerText = `🎵 ${cityName}（現地時間 ${localTimeStr}）を選曲中...`;

            let weatherTag = "chill";
            if (weather === "Clear") weatherTag = temp >= 25 ? "summer energetic" : "happy breezy";
            else if (weather === "Rain") weatherTag = "rainy jazz piano mellow";
            else if (weather === "Clouds") weatherTag = "lofi chill ambient";

            const q = `${weatherTag} ${timeTag}`;
            const sRes = await fetch(`${BASE_API_URL}/search?q=${encodeURIComponent(q)}&type=track&limit=6`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const sData = await sRes.json();

            if (loader) loader.style.display = "none";
            
            // 💡 画面に表示するHTML（現地時間がはっきり出るように修正）
            let html = `
                <div style="text-align:center; margin-bottom:20px; padding:15px; background:rgba(0,0,0,0.4); border-radius:12px;">
                    <div style="font-size: 1.4rem; font-weight: bold; color: var(--spotify-green); margin-bottom:8px;">${cityName}</div>
                    <div style="font-size: 1.1rem; color: #fff; font-weight:bold; margin-bottom:4px;">
                        ⏰ 現地時間: ${localTimeStr} <span style="font-size:0.9rem; font-weight:normal;">(${timeLabel}モード)</span>
                    </div>
                    <div style="font-size: 0.9rem; color: var(--text-sub);">
                        🌤️ 天気: ${temp}℃ / ${weather}
                    </div>
                </div>`;
            
            const trackUris = [];
            if (sData && sData.tracks && sData.tracks.items) {
                sData.tracks.items.forEach(track => {
                    trackUris.push(track.uri);
                    html += `
                        <div class="track-card">
                            <img src="${track.album.images[0].url}" class="track-img">
                            <div style="flex-grow:1; overflow:hidden;">
                                <div style="font-weight:bold; white-space:nowrap; text-overflow:ellipsis; overflow:hidden;">${track.name}</div>
                                <div style="font-size:0.8rem; color:#888;">${track.artists[0].name}</div>
                                <a href="${track.external_urls.spotify}" target="_blank" style="color:var(--spotify-green); font-size:0.7rem; text-decoration:none;">SPOTIFYで聴く</a>
                            </div>
                        </div>`;
                });
            }

            html += `<button class="btn btn-spotify" onclick='window.savePlaylist(this, "${cityName} Weather", ${JSON.stringify(trackUris)})'>💾 プレイリストを保存</button>`;
            if (resultDiv) resultDiv.innerHTML = html;

        } catch (e) { 
            if (loader) loader.style.display = "none";
            console.error("エラー詳細:", e);
            alert("エラーが発生しました: " + e.message); 
        }
    }

    window.selectCity = function(cityName) {
        const cityInput = document.getElementById("cityInput");
        if (cityInput) cityInput.value = cityName;
        searchMusic(`${BASE_WEATHER_URL}q=${cityName}&appid=${WEATHER_API_KEY}&units=metric`);
    };

    window.savePlaylist = async function(btn, name, uris) {
        const token = localStorage.getItem("spotify_access_token");
        const originalText = btn.innerText;
        btn.innerText = "⏳ 保存中...";
        try {
            const r1 = await fetch(`${BASE_API_URL}/me/playlists`, {
                method: 'POST', headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name, public: false })
            });
            const d1 = await r1.json();
            if (!r1.ok) throw new Error(d1.error ? d1.error.message : "枠の作成に失敗");
            
            const r2 = await fetch(`${BASE_API_URL}/playlists/${d1.id}/items`, {
                method: 'POST', headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
                body: JSON.stringify({ uris: uris })
            });
            if (!r2.ok) throw new Error("楽曲の追加に失敗");
            
            const spotifyUrl = d1.external_urls.spotify;
            btn.outerHTML = `<a href="${spotifyUrl}" target="_blank" class="btn btn-spotify" style="text-decoration:none;">✨ 成功！Spotifyで開く</a>`;
            window.open(spotifyUrl, '_blank');
        } catch (e) { alert("保存失敗: " + e.message); btn.innerText = originalText; }
    };

    window.addEventListener('DOMContentLoaded', () => {
        const loginBtn = document.getElementById("loginBtn");
        if (loginBtn) {
            loginBtn.addEventListener("click", async () => {
                const verifier = generateRandomString(128);
                localStorage.setItem("spotify_verifier", verifier);
                const challenge = await generateCodeChallenge(verifier);
                const params = new URLSearchParams({
                    client_id: SPOTIFY_CLIENT_ID, response_type: 'code', redirect_uri: REDIRECT_URI,
                    scope: 'playlist-modify-public playlist-modify-private', code_challenge_method: 'S256', code_challenge: challenge
                });
                window.location.href = BASE_AUTH_URL + params.toString();
            });
        }

        const code = new URLSearchParams(window.location.search).get('code');
        if (code) {
            const verifier = localStorage.getItem("spotify_verifier");
            fetch(BASE_TOKEN_URL, {
                method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ client_id: SPOTIFY_CLIENT_ID, grant_type: 'authorization_code', code, redirect_uri: REDIRECT_URI, code_verifier: verifier })
            }).then(r => r.json()).then(data => {
                if (data.access_token) {
                    localStorage.setItem("spotify_access_token", data.access_token);
                    window.history.replaceState({}, document.title, window.location.pathname);
                    location.reload();
                }
            });
        }

        const savedToken = localStorage.getItem("spotify_access_token");
        if (savedToken) {
            if (loginBtn) loginBtn.style.display = "none";
            const weatherAppSection = document.getElementById("weatherAppSection");
            if (weatherAppSection) weatherAppSection.style.display = "block";
            
            fetch(`${BASE_API_URL}/me`, { headers: { 'Authorization': 'Bearer ' + savedToken } })
                .then(r => r.json()).then(data => {
                    const profile = document.getElementById("userProfile");
                    if (profile && data && data.display_name) {
                        profile.innerText = `👤 Hello, ${data.display_name}`;
                        profile.style.display = "block";
                    }
                });
        }

        const gpsBtn = document.getElementById("gpsBtn");
        if (gpsBtn) gpsBtn.addEventListener("click", () => {
            navigator.geolocation.getCurrentPosition(p => {
                searchMusic(`${BASE_WEATHER_URL}lat=${p.coords.latitude}&lon=${p.coords.longitude}&appid=${WEATHER_API_KEY}&units=metric`);
            }, () => alert("位置情報の取得に失敗しました。"));
        });

        const getWeatherBtn = document.getElementById("getWeatherBtn");
        if (getWeatherBtn) getWeatherBtn.addEventListener("click", () => {
            const city = document.getElementById("cityInput").value || "Kyoto";
            searchMusic(`${BASE_WEATHER_URL}q=${city}&appid=${WEATHER_API_KEY}&units=metric`);
        });

        const tripBtn = document.getElementById("tripBtn");
        if (tripBtn) tripBtn.addEventListener("click", () => {
            const city = WORLD_CITIES[Math.floor(Math.random() * WORLD_CITIES.length)];
            document.getElementById("cityInput").value = city;
            searchMusic(`${BASE_WEATHER_URL}q=${city}&appid=${WEATHER_API_KEY}&units=metric`);
        });

        const clearBtn = document.getElementById("clearBtn");
        if (clearBtn) clearBtn.addEventListener("click", () => { localStorage.clear(); location.reload(); });
    });
</script>
</body>
</html>
