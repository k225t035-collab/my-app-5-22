<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Beats 2.0</title>
    <style>
        :root {
            --spotify-green: #1DB954;
            --trip-purple: #7c4dff;
            --bg-dark: #121212;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg-dark); 
            color: #fff; 
            padding: 20px;
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .container { 
            max-width: 500px; 
            width: 100%;
            background: linear-gradient(145deg, #1e1e1e, #121212);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 { text-align: center; font-weight: 800; letter-spacing: -1px; margin-bottom: 30px; }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .btn { 
            display: flex; align-items: center; justify-content: center;
            padding: 14px; margin: 8px 0; border-radius: 50px; border: none; 
            cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s;
            font-size: 1rem;
        }
        
        .btn-spotify { background: var(--spotify-green); color: black; }
        .btn-spotify:hover { transform: scale(1.02); background: #1ed760; }
        
        /* 🌟 現在地ボタンの専用デザイン */
        .btn-gps { background: transparent; color: var(--spotify-green); border: 2px solid var(--spotify-green); }
        .btn-gps:hover { background: rgba(29, 185, 84, 0.1); transform: translateY(-2px); }

        .btn-weather { background: #333; color: white; border: 1px solid #555; }
        .btn-weather:hover { background: #444; }

        .btn-trip { background: var(--trip-purple); color: white; box-shadow: 0 4px 15px rgba(124, 77, 255, 0.3); }
        .btn-trip:hover { background: #9575cd; transform: translateY(-2px); }

        input { 
            width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; 
            border: 1px solid #444; box-sizing: border-box; background: #222; color: white;
            outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--spotify-green); }

        #weatherAppSection { display: none; margin-top: 20px; border-top: 1px solid #333; padding-top: 20px; }

        #loading { text-align: center; color: var(--spotify-green); display: none; padding: 20px; font-weight: bold; }

        .divider { text-align: center; margin: 15px 0; color: #888; font-size: 0.85rem; position: relative; }
        .divider::before, .divider::after { content: ""; position: absolute; top: 50%; width: 40%; height: 1px; background: #333; }
        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .track-card {
            display: flex; align-items: center; margin-bottom: 12px; background: rgba(255,255,255,0.05); 
            padding: 12px; border-radius: 12px; transition: 0.2s;
        }
        .track-card:hover { background: rgba(255,255,255,0.1); }
        .track-img { width: 55px; height: 55px; border-radius: 8px; margin-right: 15px; }

        .btn-clear { background: none; color: #666; font-size: 0.8rem; text-decoration: underline; margin-top: 40px; border: none; cursor: pointer; width: 100%; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Weather Beats <span style="color:var(--spotify-green)">2.0</span></h2>
        
        <div id="userProfile" class="glass-panel" style="display:none; text-align:center;"></div>

        <button id="loginBtn" class="btn btn-spotify">Spotifyと連携する</button>

        <div id="weatherAppSection">
            <button id="gpsBtn" class="btn btn-gps">📍 ワンタップで現在地の天気から選曲</button>
            
            <div class="divider">または</div>

            <div class="glass-panel">
                <input type="text" id="cityInput" placeholder="都市名をローマ字で入力 (例: Tokyo)">
                <button id="getWeatherBtn" class="btn btn-weather">入力した都市の天気で選曲</button>
            </div>

            <button id="tripBtn" class="btn btn-trip">🌍 世界のどこかへ音のトリップ</button>

            <div id="loading">🎵 選曲中...</div>
            <div id="result"></div>
        </div>

        <button id="clearBtn" class="btn btn-clear">キャッシュをクリアしてやり直す</button>
    </div>

    <script src="script.js?ver=2.4"></script>
</body>
</html>
