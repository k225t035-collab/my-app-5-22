<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Beats Pro - Genre & Temp Update</title>
    <style>
        body {
            margin: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            max-width: 420px;
            width: 90%;
        }

        h1 { margin: 0 0 5px 0; font-size: 1.8rem; letter-spacing: 2px; }
        p.subtitle { color: #b3b3b3; font-size: 0.85rem; margin-bottom: 25px; }

        .user-profile {
            background: rgba(29, 185, 84, 0.1);
            border: 1px solid rgba(29, 185, 84, 0.3);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #1DB954;
            font-weight: bold;
            display: none;
        }

        .input-group { margin-bottom: 15px; }

        .search-box { display: flex; gap: 10px; margin-bottom: 10px; }

        .input-field, #genreSelect {
            padding: 14px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .input-field { flex-grow: 1; }
        #genreSelect { width: 100%; cursor: pointer; }

        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin: 10px 0;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        #gpsBtn {
            width: auto; padding: 0 15px; background: rgba(255,255,255,0.1);
            color: white; border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; font-size: 1.2rem;
        }

        #loginBtn { background-color: #1DB954; color: white; }
        #clearBtn { background: #444; color: #ccc; font-size: 0.8rem; padding: 8px; }
        #getWeatherBtn { background: linear-gradient(45deg, #FF512F 0%, #F09819 100%); color: white; margin-top: 20px; }

        #result {
            margin-top: 30px; padding: 20px; background: rgba(0, 0, 0, 0.3);
            border-radius: 15px; text-align: left; border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎧 Weather Beats</h1>
        <p class="subtitle">AIが気温とジャンルから選曲</p>
        
        <div id="userProfile" class="user-profile"></div>
        
        <div class="input-group">
            <div class="search-box">
                <input type="text" id="cityInput" class="input-field" placeholder="都市名を英語で入力" value="Kyoto">
                <button id="gpsBtn" title="現在地を取得">📍</button>
            </div>
            <select id="genreSelect">
                <option value="j-pop">🌸 J-POP</option>
                <option value="k-pop">✨ K-POP</option>
                <option value="pop">🎤 Global Pop</option>
                <option value="rock">🎸 Rock</option>
                <option value="edm">🎧 EDM / Dance</option>
                <option value="jazz">🎷 Jazz</option>
                <option value="lofi">☕ Lofi HipHop</option>
                <option value="classical">🎻 Classical</option>
            </select>
        </div>
        
        <button id="loginBtn" class="btn">1. Spotifyと連携</button>
        <button id="clearBtn" class="btn">🔑 連携をリセット</button>
        <button id="getWeatherBtn" class="btn" disabled>2. 曲を生成する</button> 
        
        <div id="result">
            <p style="text-align: center; color: #888;">準備ができたら「2」を押してね</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
