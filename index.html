<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Beats</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .btn { display: inline-block; padding: 12px 15px; margin: 5px 0; border-radius: 50px; border: none; cursor: pointer; font-weight: bold; width: 100%; box-sizing: border-box; text-align: center; }
        .btn-spotify { background: #1DB954; color: black; }
        .btn-weather { background: #333333; color: white; border: 1px solid #777; }
        .btn-trip { background: #7c4dff; color: white; } /* 世界トリップ用のおしゃれな紫色 */
        .btn-danger { background: transparent; color: #aaa; text-decoration: underline; margin-top: 30px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; box-sizing: border-box; background: #282828; color: white; }
        #userProfile { background: #282828; padding: 10px; border-radius: 5px; margin-bottom: 20px; display: none; text-align: center; font-size: 0.9rem; }
        #result { margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align: center;">☁️ Weather Beats 🎧</h2>
        
        <div id="userProfile"></div>

        <button id="loginBtn" class="btn btn-spotify">1. Spotifyと連携する</button>

        <div style="margin-top: 20px;">
            <input type="text" id="cityInput" placeholder="都市名を入力 (例: Tokyo, Osaka)">
            <button id="getWeatherBtn" class="btn btn-weather" disabled>2. 天気から全自動選曲</button>
            <button id="gpsBtn" class="btn btn-weather">📍 現在地の天気から選曲</button>
            
            <button id="tripBtn" class="btn btn-trip" style="margin-top: 10px;">🌍 世界のどこかへ音のトリップ</button>
        </div>

        <div id="result"></div>

        <button id="clearBtn" class="btn btn-danger">データクリア (最初からやり直す)</button>
    </div>

    <script src="script.js?ver=1.0"></script>
</body>
</html>
