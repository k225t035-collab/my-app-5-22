<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Beats Pro</title>
    <style>
        body {
            margin: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            max-width: 420px;
            width: 90%;
        }

        h1 {
            margin-top: 0;
            font-size: 1.8rem;
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        p.subtitle {
            color: #b3b3b3;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        /* 都市入力エリアの横並び設定 */
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .input-field {
            flex-grow: 1;
            padding: 14px 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.2);
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: #1DB954;
            box-shadow: 0 0 8px rgba(29, 185, 84, 0.3);
        }

        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin: 10px 0;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 7px 20px rgba(0,0,0,0.4);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        /* 各種ボタンの専用カラー */
        #gpsBtn {
            width: auto;
            padding: 0 15px;
            margin: 0;
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            font-size: 1.2rem;
        }

        #loginBtn {
            background-color: #1DB954;
            color: white;
            box-shadow: 0 4px 15px rgba(29, 185, 84, 0.3);
        }

        #getWeatherBtn {
            background: linear-gradient(45deg, #FF512F 0%, #F09819 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 81, 47, 0.3);
        }

        /* 💾 プレイリスト保存ボタンのスタイル */
        #playlistBtn {
            background: linear-gradient(45deg, #00c6ff 0%, #0072ff 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 114, 255, 0.3);
            margin-top: 15px;
        }

        #result {
            margin-top: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            min-height: 80px;
            text-align: left;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* 試聴ボタン（ミニサイズ） */
        .preview-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            cursor: pointer;
            margin-right: 8px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .preview-btn.playing {
            background: #ff4757;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎧 Weather Beats Pro</h1>
        <p class="subtitle">30秒試聴・GPS・プレイリスト保存機能搭載</p>
        
        <div class="search-box">
            <input type="text" id="cityInput" class="input-field" placeholder="都市名を英語で入力" value="Kyoto">
            <button id="gpsBtn" title="現在地を使う">📍</button>
        </div>
        
        <button id="loginBtn" class="btn">1. Spotifyと連携する</button>
        <button id="getWeatherBtn" class="btn" disabled>2. 天気から曲を検索</button> 
        
        <div id="result">
            <p style="text-align: center; color: #888;">ここに結果が表示されます</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
